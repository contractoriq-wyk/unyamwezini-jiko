  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const BAKERY = [
      { id:1, key:"maandazi", e:"🥮", name:"Maandazi", sw:"East African Sweet Dough",
        desc:"Light, airy, and kissed with fragrant cardamom. Golden triangle-shaped treats — the perfect companion for your morning tea or a sweet afternoon snack.",
        price:"$10.60", unit:"6 pieces", min:"Minimum 6 pieces", total:10.60, star:true, tags:["gluten","eggs","dairy"] },
      { id:2, key:"chapati", e:"🫓", name:"Chapati", sw:"Layered East African Flatbread",
        desc:"Forget what you know about flatbread. Hand-stretched and pan-toasted until golden, buttery layers peel apart with ease. Made fresh every time.",
        price:"$19.60", unit:"6 pieces", min:"Minimum 6 pieces", total:19.60, star:true, tags:["gluten","dairy"] },
      { id:3, key:"vitumbua", e:"🍡", name:"Vitumbua", sw:"Coconut Rice Cakes",
        desc:"Deeply addictive coconut rice cakes cooked in a traditional pan — crispy golden shell, soft melt-in-your-mouth center. A true Swahili classic.",
        price:"$10.60", unit:"6 pieces", min:"Minimum 6 pieces", total:10.60, star:false, tags:["coconut"] },
      { id:4, key:"bread", e:"🍞", name:"Boflo Rolls", sw:"Mikate ya Nyumbani",
        desc:"Pillowy soft dinner rolls straight from Mama JJJ's oven. Golden domed tops, fluffy pull-apart centers. Perfect for any occasion.",
        price:"$12.00", unit:"6 rolls", min:"Minimum 6 rolls", total:12.00, star:false, tags:["gluten","eggs","dairy"] },
    ];

    const TIMES = ["10:00 AM","11:00 AM","12:00 PM","1:00 PM","3:00 PM","4:30 PM"];

    function getDates() {
      const D=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const M=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const now=new Date();
      return Array.from({length:10},(_,i)=>{
        const d=new Date(now); d.setDate(now.getDate()+i);
        return{label:D[d.getDay()],date:d.getDate(),month:M[d.getMonth()],
          full:d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}),
          disabled:i<2};
      });
    }

    function App() {
      const [cart,setCart]=useState([]);
      const [added,setAdded]=useState(null);
      const [cartOpen,setCartOpen]=useState(false);
      const [modal,setModal]=useState(false);
      const [step,setStep]=useState(1);
      const [scrolled,setScrolled]=useState(false);
      const [orderNum]=useState(()=>"JJJ-"+Math.floor(Math.random()*9000+1000));
      const [pickDate,setPickDate]=useState(null);
      const [pickTime,setPickTime]=useState(null);
      const [payMethod,setPayMethod]=useState(null);
      const [form,setForm]=useState({name:"",email:"",phone:"",notes:""});
      const [inq,setInq]=useState({name:"",phone:"",email:"",date:"",guests:"",dish:"",notes:""});
      const [inqDone,setInqDone]=useState(false);

      const dates=getDates();
      const count=cart.reduce((s,i)=>s+i.qty,0);
      const total=cart.reduce((s,i)=>s+i.total*i.qty,0);

      useEffect(()=>{
        const fn=()=>setScrolled(window.scrollY>80);
        window.addEventListener("scroll",fn);
        return ()=>window.removeEventListener("scroll",fn);
      },[]);

      function go(id){document.getElementById(id)?.scrollIntoView({behavior:"smooth"})}
      function add(p){
        setCart(prev=>{const ex=prev.find(i=>i.id===p.id);
          return ex?prev.map(i=>i.id===p.id?{...i,qty:i.qty+1}:i):[...prev,{...p,qty:1}];});
        setAdded(p.id); setTimeout(()=>setAdded(null),800);
      }
      function upd(id,d){setCart(p=>p.map(i=>i.id===id?{...i,qty:i.qty+d}:i).filter(i=>i.qty>0));}
      function checkout(){setCartOpen(false);setStep(1);setModal(true);}
      function place(){setStep(5);setCart([]);}
      const ok1=pickDate&&pickTime, ok2=form.name&&form.email&&form.phone, ok3=!!payMethod;

      const css = `
        :root{
          --s:#E8DAEF;--pw:#F4ECF7;--pa:#FBF5FF;
          --dp:#6C3483;--oc:#4A235A;--mi:#8E44AD;--li:#C39BD3;
          --co:#7D3C98;--go:#9B59B6;--iv:#FDF8FF;
          --tx:#2C1A4A;--mu:#7D6B8A;--bo:#D2B4DE;
          --sh:rgba(108,52,131,0.09);
        }
        body{background:var(--pa);color:var(--tx);font-family:'Nunito',sans-serif;}
        .nav{position:fixed;top:0;left:0;right:0;z-index:200;transition:all 0.4s;padding:0 24px;}
        .nav.top{background:transparent}
        .nav.sc{background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--bo);box-shadow:0 4px 30px var(--sh)}
        .nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:66px}
        .brand{display:flex;align-items:center;gap:10px;cursor:pointer}
        .brand-logo{width:42px;height:42px;border-radius:10px;overflow:hidden;box-shadow:0 4px 12px rgba(108,52,131,0.3);flex-shrink:0}
        .brand-logo img{width:100%;height:100%;object-fit:cover}
        .brand-name{font-family:'Cormorant Garant',serif;font-size:13px;font-weight:700;white-space:nowrap;transition:color 0.3s;line-height:1.2}
        .nav.top .brand-name{color:white}
        .nav.sc .brand-name{color:var(--oc)}
        .brand-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;transition:color 0.3s}
        .nav.top .brand-sub{color:rgba(255,255,255,0.6)}
        .nav.sc .brand-sub{color:var(--li)}
        .nav-links{display:flex;align-items:center;gap:16px}
        .nl{font-size:12px;font-weight:700;cursor:pointer;transition:color 0.2s}
        .nav.top .nl{color:rgba(255,255,255,0.8)}
        .nav.sc .nl{color:var(--mu)}
        .nl:hover{color:var(--dp)!important}
        .cart-pill{display:flex;align-items:center;gap:8px;background:var(--co);border:none;border-radius:50px;padding:9px 16px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:white;transition:all 0.2s;box-shadow:0 4px 14px rgba(125,60,152,0.35)}
        .cart-pill:hover{background:var(--go);transform:translateY(-1px)}

                  {icon:"📸",name:"Instagram",handle:"@JikoLaMamaJJJ"},
                  {icon:"💬",name:"WhatsApp",handle:"Direct Orders Welcome"},
                  {icon:"🎵",name:"TikTok",handle:"@MamaJJJKitchen"},
                  {icon:"▶️",name:"YouTube",handle:"Mama JJJ Kitchen"},
                  {icon:"✖️",name:"X",handle:"@JikoMamaJJJ"},
                ].map(s=>(
                  <div className="soc-btn" key={s.name}>
                    <span className="soc-icon">{s.icon}</span>
                    <div><div className="soc-name">{s.name}</div><div className="soc-handle">{s.handle}</div></div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div className="footer">
            <div className="footer-grid">
              <div>
                <div className="footer-brand">
                  <div className="footer-logo"><img src={IMGS.logo} alt="Logo"/></div>
                  <div><div className="footer-name">Unyamwezini Jiko La Mama JJJ</div><div className="footer-sub">unyamwezinijikolamamajjj.com</div></div>
                </div>
                <p className="footer-about">From Mama Lilian's home kitchen to your table — every bake is a piece of Tanzania, made with love and the spirit of Karibu.</p>
                <div style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"rgba(230,210,245,0.45)",marginTop:10}}>🌐 unyamwezinibakery.com</div>
              </div>
              <div>
                <div className="footer-h">Navigate</div>
                {["The Bakery","Private Kitchen","Our Story","How It Works"].map(l=>(
                  <span className="footer-link" key={l} onClick={()=>go(l==="The Bakery"?"menu":l==="Private Kitchen"?"catering":l==="Our Story"?"about":"how")}>{l}</span>
                ))}
              </div>
              <div>
                <div className="footer-h">Order Policy</div>
                <p style={{fontSize:12.5,color:"rgba(230,210,245,0.72)",lineHeight:2}}>48-hour notice required.<br/>Full payment before baking.<br/>All sales final.<br/>Pickup only — Columbia, MD.<br/>Full refund if we can't fulfill.</p>
              </div>
              <div>
                <div className="footer-h">Payment & Contact</div>
                <p style={{fontSize:12.5,color:"rgba(230,210,245,0.72)",lineHeight:2}}>Columbia, Maryland<br/>Howard County, MD<br/><br/>💚 Zelle: Lilian Kigembe<br/>💚 Cash App: $MamaWaJJJ<br/>💵 Cash: Drop-off</p>
              </div>
            </div>
            <div className="footer-divider" style={{marginBottom:22}}/>
            <div className="footer-bottom">
              <div className="footer-legal">© 2026 Unyamwezini Jiko La Mama JJJ · Columbia, Maryland</div>
              <div className="footer-legal">MD Cottage Food Licensed · Howard County · unyamwezinijikolamamajjj.com</div>
            </div>
          </div>

          <div className="disclaimer">
            <div className="disc-inner">
              <strong>Unyamwezini Jiko La Mama JJJ · unyamwezinijikolamamajjj.com</strong><br/>
              <strong>Legal Disclaimer —</strong> This is a licensed Maryland Cottage Food Business operating under the Maryland Cottage Food Law (MD Code, Health-General § 21-301.1). Products are prepared in a residential kitchen that is <strong>not inspected</strong> by the Maryland Department of Health or Howard County Health Department. All products are non-potentially-hazardous baked goods sold directly to consumers within Maryland only. By ordering you accept the 48-hour notice requirement, prepayment policy, and all-sales-final terms. Full refund issued if business cannot fulfill. For allergen inquiries contact us before ordering.
            </div>
          </div>

          {cartOpen&&<>
            <div className="overlay" onClick={()=>setCartOpen(false)}/>
            <div className="drawer">
              <div className="dr-head">
                <div className="dr-title">🛒 Your Basket</div>
                <button className="dr-close" onClick={()=>setCartOpen(false)}>×</button>
              </div>
              {cart.length>0&&<div className="dr-notice"><span style={{fontSize:18}}>💳</span><div><strong>Payment required before baking</strong>We'll send Zelle, Cash App or Cash instructions after ordering.</div></div>}
              <div className="dr-body">
                {cart.length===0?<div className="ec"><div style={{fontSize:48,marginBottom:10}}>🧺</div><div style={{fontSize:15,fontWeight:700,color:"var(--tx)"}}>Your basket is empty</div><div style={{fontSize:12,marginTop:6}}>Browse the Golden Four!</div></div>
                :cart.map(item=>(
                  <div className="ci" key={item.id}>
                    <div className="ci-img"><img src={IMGS[item.key]} alt={item.name}/></div>
                    <div style={{flex:1}}>
                      <div className="ci-name">{item.name}</div>
                      <div className="ci-price">{item.price} / {item.unit}</div>
                      <div className="qc">
                        <button className="qb" onClick={()=>upd(item.id,-1)}>−</button>
                        <span className="qn">{item.qty}</span>
                        <button className="qb" onClick={()=>upd(item.id,+1)}>+</button>
                      </div>
                    </div>
                    <div className="ci-tot">${(item.total*item.qty).toFixed(2)}</div>
                  </div>
                ))}
              </div>
              {cart.length>0&&<div className="dr-foot">
                <div className="tot-row"><span className="tot-lbl">Order Total</span><span className="tot-val">${total.toFixed(2)}</span></div>
                <button className="ck-btn" onClick={checkout}>Select Pickup Time →</button>
                <div style={{textAlign:"center",fontSize:11,color:"var(--mu)",marginTop:9}}>⏰ Pickup 48hrs+ from today · Columbia, MD</div>
              </div>}
            </div>
          </>}

          {modal&&<div className="mwrap" onClick={e=>e.target===e.currentTarget&&step<5&&setModal(false)}>
            <div className="mbox">
              {step<5&&<>
                <div className="mhead">
                  <div className="mtitle">{step===1?"📅 Choose Pickup":step===2?"👤 Your Details":step===3?"💳 Payment":"✅ Review"}</div>
                  <div className="msub">{step===1?"Dates within 48hrs unavailable":step===2?"We'll text when order is ready":step===3?"Instructions sent after confirming":"Final check before Mama JJJ fires up!"}</div>
                </div>
                <div className="sbar">
                  {["Pickup","Details","Payment","Review"].map((l,i)=>{
                    const n=i+1,done=step>n,act=step===n;
                    return <div className="su" key={l}><div className="sc"><div className={`sd ${done?"done":act?"active":""}`}>{done?"✓":n}</div><div className={`sl ${done?"done":act?"active":""}`}>{l}</div></div>{i<3&&<div className={`sline ${done?"done":""}`}/>}</div>;
                  })}
                </div>
              </>}
              <div className="mbody">
                {step===1&&<>
                  <div className="mf">
                    <label>Pickup Date — <span style={{color:"var(--co)"}}>Min. 48hrs from today</span></label>
                    <div className="dgrid">
                      {dates.map(d=><div key={d.full} className={`dchip ${d.disabled?"dis":""} ${pickDate===d.full?"sel":""}`} onClick={()=>!d.disabled&&setPickDate(d.full)}>
                        {d.disabled&&<div className="ts-tag">Too soon</div>}
                        <div className="dd">{d.label}</div><div className="dn">{d.date}</div><div className="dm">{d.month}</div>
                      </div>)}
                    </div>
                  </div>
                  <div className="mf" style={{marginTop:16}}>
                    <label>Pickup Time</label>
                    <div className="tgrid">{TIMES.map(t=><div key={t} className={`tchip ${pickTime===t?"sel":""}`} onClick={()=>setPickTime(t)}>{t}</div>)}</div>
                  </div>
                  <div style={{background:"var(--pw)",border:"1px solid var(--bo)",borderRadius:10,padding:"11px 14px",fontSize:12,color:"var(--mu)",marginTop:12}}>📍 Pickup in <strong style={{color:"var(--dp)"}}>Columbia, MD</strong> — address sent after payment.</div>
                  <div className="frow"><button className="btn btn-g" onClick={()=>setModal(false)}>← Back</button><button className="btn btn-p" onClick={()=>setStep(2)} disabled={!ok1}>Continue →</button></div>
                </>}
                {step===2&&<>
                  <div className="mr2">
                    <div className="mf"><label>Full Name</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Jane Smith"/></div>
                    <div className="mf"><label>Phone</label><input value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="(410) 555-0100"/></div>
                  </div>
                  <div className="mf"><label>Email</label><input type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="jane@email.com"/></div>
                  <div className="mf"><label>Notes (optional)</label><textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Allergies, occasion, how you heard about us…"/></div>
                  <div className="frow"><button className="btn btn-g" onClick={()=>setStep(1)}>← Back</button><button className="btn btn-p" onClick={()=>setStep(3)} disabled={!ok2}>Continue →</button></div>
                </>}
                {step===3&&<>
                  <div style={{background:"#F9F0FF",border:"1.5px solid #D2B4DE",borderLeft:"4px solid var(--mi)",borderRadius:10,padding:"12px 15px",marginBottom:16,fontSize:13,color:"#5A2A7A",lineHeight:1.65}}>
                    <strong style={{display:"block",color:"var(--mi)",marginBottom:3}}>⚠️ Baking Starts After Payment Is Received</strong>
                    Mama JJJ will text you payment details after you confirm. Once paid, baking begins!
                  </div>
                  <div style={{fontFamily:"Cormorant Garant,serif",fontSize:16,fontWeight:700,color:"var(--tx)",marginBottom:11}}>How will you send payment?</div>
                  {[{id:"zelle",i:"💚",l:"Zelle",s:"Lilian Kigembe — Instant transfer"},
                    {id:"cashapp",i:"💚",l:"Cash App",s:"$MamaWaJJJ"},
                    {id:"cash",i:"💵",l:"Cash Drop-Off",s:"Before baking begins"},
                  ].map(o=><div key={o.id} className={`popt ${payMethod===o.id?"sel":""}`} onClick={()=>setPayMethod(o.id)}>
                    <div className="pr"/><span style={{fontSize:20}}>{o.i}</span>
                    <div><div style={{fontWeight:800,color:"var(--tx)",fontSize:13}}>{o.l}</div><div style={{fontSize:11,color:"var(--mu)",marginTop:1}}>{o.s}</div></div>
                  </div>)}
                  <div style={{fontSize:11,color:"var(--mu)",lineHeight:1.7,marginTop:11}}>🔒 We never collect card info on this site.</div>
                  <div className="frow"><button className="btn btn-g" onClick={()=>setStep(2)}>← Back</button><button className="btn btn-p" onClick={()=>setStep(4)} disabled={!ok3}>Review →</button></div>
                </>}
                {step===4&&<>
                  <div style={{fontFamily:"Cormorant Garant,serif",fontSize:16,fontWeight:700,color:"var(--tx)",marginBottom:11}}>🛒 Order Items</div>
                  <div className="rbox">
                    {cart.map(item=><div className="ri" key={item.id}>
                      <div><div style={{fontWeight:600,color:"var(--tx)"}}>{item.name}</div><div style={{fontSize:11,color:"var(--mu)",marginTop:2}}>× {item.qty} · {item.unit}</div></div>
                      <div style={{fontFamily:"Cormorant Garant,serif",fontSize:17,fontWeight:700,color:"var(--dp)"}}>${(item.total*item.qty).toFixed(2)}</div>
                    </div>)}
                  </div>
                  <div className="totbox">
                    <div className="trow"><span>Subtotal</span><span>${total.toFixed(2)}</span></div>
                    <div className="trow"><span>Pickup</span><span style={{color:"#2E7D5A"}}>Free</span></div>
                    <div className="tfin">
                      <span style={{fontFamily:"Cormorant Garant,serif",fontSize:17,fontWeight:700,color:"var(--tx)"}}>Total Due Before Baking</span>
                      <span style={{fontFamily:"Cormorant Garant,serif",fontSize:24,fontWeight:700,color:"var(--dp)"}}>${total.toFixed(2)}</span>
                    </div>
                  </div>
                  <div className="pcard">
                    <div className="prow"><span>📅</span><div><strong>{pickDate}</strong> at <strong>{pickTime}</strong></div></div>
                    <div className="prow"><span>📍</span><div>Columbia, MD — address sent after payment</div></div>
                    <div className="prow"><span>👤</span><div>{form.name} · {form.phone}</div></div>
                    <div className="prow"><span>💳</span><div>Via <strong>{payMethod==="zelle"?"Zelle (Lilian Kigembe)":payMethod==="cashapp"?"Cash App ($MamaWaJJJ)":"Cash Drop-Off"}</strong></div></div>
                  </div>
                  <div style={{background:"var(--pw)",border:"1px solid var(--bo)",borderRadius:10,padding:"11px 14px",fontSize:12,color:"var(--mu)",lineHeight:1.6,marginBottom:8}}>✅ By ordering you agree baking begins only after payment. All sales final once baking starts.</div>
                  <div className="frow"><button className="btn btn-g" onClick={()=>setStep(3)}>← Back</button><button className="btn btn-c" onClick={place}>🎉 Place My Order!</button></div>
                </>}
                {step===5&&<div className="swrap">
                  <div className="sicon">🔥</div>
                  <div className="stitle">Asante Sana!</div>
                  <div className="ssw">"Thank you so much" — Karibu to Mama JJJ's kitchen</div>
                  <p className="ssub">Your order is in! Mama JJJ will send payment details shortly. Once paid, the Jiko fires up! 🇹🇿</p>
                  <div className="ccard">
                    <div className="crow"><span>🔢</span><span style={{fontWeight:800,color:"var(--dp)",minWidth:90}}>Order #</span><span style={{fontFamily:"DM Mono,monospace",fontWeight:700,color:"var(--dp)"}}> {orderNum}</span></div>
                    <div className="crow"><span>👤</span><span style={{fontWeight:800,color:"var(--dp)",minWidth:90}}>Name</span><span style={{color:"var(--mu)"}}>{form.name||"—"}</span></div>
                    <div className="crow"><span>📅</span><span style={{fontWeight:800,color:"var(--dp)",minWidth:90}}>Pickup</span><span style={{color:"var(--mu)"}}>{pickDate} · {pickTime}</span></div>
                    <div className="crow"><span>💳</span><span style={{fontWeight:800,color:"var(--dp)",minWidth:90}}>Payment</span><span style={{color:"var(--mu)"}}>Instructions coming via text</span></div>
                    <div className="crow"><span>💰</span><span style={{fontWeight:800,color:"var(--dp)",minWidth:90}}>Total Due</span><span style={{color:"var(--dp)",fontWeight:800}}>${total.toFixed(2)}</span></div>
                  </div>
                  <p style={{fontSize:12,color:"var(--mu)",lineHeight:1.75,marginBottom:20}}>📱 We'll text <strong>{form.phone||"you"}</strong> with payment details. Once confirmed, baking begins!</p>
                  <button className="btn btn-p" style={{padding:"13px 28px"}} onClick={()=>{setModal(false);setStep(1);setPickDate(null);setPickTime(null);setPayMethod(null);setForm({name:"",email:"",phone:"",notes:""});}}>Back to Menu 🔥</button>
                </div>}
              </div>
            </div>
          </div>}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
